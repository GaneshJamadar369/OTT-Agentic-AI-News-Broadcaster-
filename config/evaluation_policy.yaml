# config/evaluation_policy.yaml
# Revised strict policy for LOQO AI broadcast evaluation
version: "2.1.1"

max_graph_iterations: 3

agent_max_retries:
  journalist: 2
  editor: 2
  visualizer: 2
  tagger: 2

# Weighted averages (1–5 scale). Agent WA must clear bar after merging code + LLM metrics (many weights).
overall_pass_threshold_per_agent: 4.3
overall_pass_threshold_cross_package: 4.3

# Any critical metric below this fails that agent bundle
critical_score_floor: 4.0

# Non-critical metrics must also clear a professional floor
min_score_per_metric: 3.0

# Hard minimum score per metric_id for a given agent
metric_minimum_scores:
  journalist:
    source_faithfulness: 4.0
    key_fact_coverage: 4.0
    lead_clarity: 4.0
    balance_neutrality: 3.0
    numerical_fidelity: 4.0
    named_entity_accuracy: 4.0
  editor:
    hook_strength: 4.5
    story_structure: 4.5
    factual_consistency_with_journalist: 4.5
    avoid_sensationalism: 4.0
    transition_smoothness: 4.0
  visualizer:
    beat_alignment: 4.5
    visual_story_match: 4.5
    use_of_source_images: 4.0
    emotional_tone_alignment: 4.0
    chyron_readability: 4.0
    layout_variety_purpose: 4.0
    shot_diversity: 4.0
  tagger:
    segment_alignment: 4.5
    headline_punch: 4.5
    tag_appropriateness: 4.5
    consistency_with_narration: 4.5
    subheadline_clarity: 4.0
    localization_wording: 4.0
    screen_fit: 4.0
  cross_package:
    global_story_coherence: 4.0
    duration_fit: 4.0
    coverage_completeness: 4.0
    redundancy_across_modalities: 4.0
    ethics_safety: 4.0

# Broadcast language for language_detection checks
expected_language: "en"

# Allowed top_tag values for tagger deterministic checks
allowed_top_tags:
  - BREAKING
  - LIVE
  - DEVELOPING
  - UPDATE
  - LATEST
  - EXCLUSIVE
  - ANALYSIS

# Editor narration word count (deterministic)
editor_word_count_min: 180
editor_word_count_max: 280

# Visualizer duration window (seconds)
video_duration_min: 75
video_duration_max: 105

# Segment counts
segment_count_min: 4
segment_count_max: 4

# Headline / subheadline char limits (deterministic)
headline_max_chars: 30
subheadline_max_chars: 45

# Retry-improvement gate: enable only if delta tracking is implemented in code
# Set to false until aggregate.py / trace.py compares current scores vs prior round
require_retry_improvement: false
min_improvement_on_retry: 0.3