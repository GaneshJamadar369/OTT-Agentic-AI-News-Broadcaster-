# Global evaluation policy — versions tracked in run artifacts
version: "1.0.0"

max_graph_iterations: 3

agent_max_retries:
  journalist: 2
  editor: 2
  visualizer: 2
  tagger: 2

# Weighted averages (1–5 scale)
overall_pass_threshold_per_agent: 4.3
overall_pass_threshold_cross_package: 4.5

# Any critical metric below this fails that agent bundle (unless overridden below)
critical_score_floor: 4

# Optional per-metric critical floors (e.g. 3.5 blocks scores 1–3 for layout/shot diversity)
critical_metric_floor_overrides:
  layout_variety_purpose: 3.5
  shot_diversity: 3.5

# Hard minimum score per metric_id for a given agent (in addition to rubric min_score)
metric_minimum_scores:
  visualizer:
    use_of_source_images: 4

# Non-critical metrics must be >= this (unless weighted policy overrides)
min_score_per_metric: 3

# Broadcast language for language_detection checks
expected_language: "en"

# Allowed top_tag values for tagger deterministic checks
allowed_top_tags:
  - BREAKING
  - LIVE
  - DEVELOPING
  - UPDATE
  - LATEST
  - EXCLUSIVE
  - ANALYSIS

# Editor narration word count (deterministic)
editor_word_count_min: 160
editor_word_count_max: 320

# Visualizer duration window (seconds)
video_duration_min: 60
video_duration_max: 120

# Segment counts
segment_count_min: 3
segment_count_max: 5

# Headline / subheadline char limits (deterministic)
headline_max_chars: 30
subheadline_max_chars: 50
